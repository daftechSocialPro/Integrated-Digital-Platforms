<div class="erp-login-container">
  <div class="erp-login-left">
    <div class="brand-info">
      <img src="assets/logo2.png" alt="Logo" class="main-logo" />
      <h1>Ethiopian Midwives Association</h1>
      <p>Enterprise Resource Planning System</p>
    </div>
  </div>
  <div class="erp-login-right">
    <div class="login-panel">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Please log in to your account to continue</p>
      </div>
      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="form-group">
          <label for="userName">Email Address</label>
          <div class="input-wrapper">
            <i class="pi pi-envelope"></i>
            <input type="email" id="userName" formControlName="userName" placeholder="Enter your email" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="pi pi-lock"></i>
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" placeholder="Enter your password" />
            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'" class="toggle-password" (click)="togglePasswordVisibility()"></i>
          </div>
        </div>
        <div class="form-actions">
          <div class="remember-me">
            <!-- Space for remember me if needed in future -->
          </div>
          <a routerLink="/forgetPassword" class="forgot-password">Forgot password?</a>
        </div>
        <button type="submit" class="btn-login" [disabled]="!loginForm.valid">
          Login
          <i class="pi pi-arrow-right"></i>
        </button>
      </form>
      <div class="login-footer">
        <p>Powered by <strong class="daftech-text">DAFTech Computer Engineering</strong></p>
      </div>
    </div>
  </div>
</div>
