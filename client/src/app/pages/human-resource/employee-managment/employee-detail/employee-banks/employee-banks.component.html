<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{{ isUpdate ? 'Update' : 'Add' }} Employee Bank Account </h5>
        <button type="button" class="btn-close" id="ModalClose" (click)="closeModal()" aria-label="Close"></button>
    </div>

    <div class="modal-body">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="p-3 bg-light rounded mb-4" *ngIf="employmentStatus == 'ACTIVE'">
                    <form [formGroup]="employeeBankForm" (ngSubmit)="submit()">
                        <div class="row align-items-end g-3">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label class="form-label fw-bold" for="bankId">Select Bank</label>
                                    <select class="form-select" id="bankId" formControlName="bankId"
                                        (change)="changeBankDigit($event.target)">
                                        <option [value]="null" disabled>Choose Bank...</option>
                                        <option *ngFor="let bank of bankLists" [value]="bank.id">{{ bank.name }}
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label class="form-label fw-bold" for="BankAccountNo">Account Number</label>
                                    <input pInputText type="text" class="form-control" id="BankAccountNo"
                                        placeholder="Enter Account No" formControlName="bankAccountNo"
                                        [minlength]="bankDigit" [maxlength]="bankDigit">
                                    <small class="text-muted" *ngIf="bankDigit">Required digits: {{bankDigit}}</small>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check pt-2">
                                    <input class="form-check-input" formControlName="isSalaryBank" type="checkbox"
                                        id="gridCheck">
                                    <label class="form-check-label fw-bold" for="gridCheck">
                                        Is Salary Bank
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-2">
                                <button type="submit" [disabled]="!employeeBankForm.valid"
                                    [class]="isUpdate ? 'btn btn-warning w-100' : 'btn btn-primary w-100'">
                                    <i [class]="isUpdate ? 'bi bi-pencil-square me-1' : 'bi bi-plus-circle me-1'"></i>
                                    {{ isUpdate ? 'Update' : 'Add' }}
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="table-responsive">
                    <p-table [value]="bankList" [paginator]="true" [rows]="5" [showCurrentPageReport]="true"
                        responsiveLayout="scroll"
                        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
                        [rowsPerPageOptions]="[5, 10, 20]" styleClass="p-datatable-gridlines p-datatable-sm">
                        <ng-template pTemplate="header">
                            <tr>
                                <th pSortableColumn="bankName">Bank <p-sortIcon field="bankName"></p-sortIcon></th>
                                <th pSortableColumn="accountNumber">Account Number <p-sortIcon
                                        field="accountNumber"></p-sortIcon></th>
                                <th class="text-center">Is Salary Bank</th>
                                <th class="text-center" style="width: 150px;">Actions</th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-bank>
                            <tr>
                                <td>{{ bank.bankName }}</td>
                                <td><code>{{ bank.accountNumber }}</code></td>
                                <td class="text-center">
                                    <span [class]="bank.isSalaryBank ? 'badge bg-success' : 'badge bg-secondary'">
                                        {{ bank.isSalaryBank ? 'Yes' : 'No' }}
                                    </span>
                                </td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-warning me-1" (click)="onEdit(bank)"
                                        title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" (click)="onDelete(bank.id)"
                                        title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="emptymessage">
                            <tr>
                                <td colspan="4" class="text-center p-3">No bank accounts found for this employee.</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
        </div>
    </div>
</div>
